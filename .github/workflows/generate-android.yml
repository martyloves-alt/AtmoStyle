name: Générer le squelette Android

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Générer les fichiers natifs Android manquants
        run: flutter create --platforms=android --org com.martyloves .

      - name: Committer le résultat
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android
          git diff --cached --quiet && echo "Rien à committer" || git commit -m "Générer le squelette natif Android"
          git push origin HEAD:main
