name: atmostyle
description: "AtmoStyle — styliste vestimentaire IA quotidien, adapté à la météo."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  timezone: '>=0.9.0 <1.0.0'
  http: '>=1.1.0 <2.0.0'
  image_picker: '>=1.0.0 <2.0.0'
  path_provider: '>=2.1.0 <3.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
